# ============================================
# Maritime - Zero Trust Architecture - Docker Compose
# ============================================

services:
  # ============================================================================
  # LAYER 4: OBSERVABILITY - SIEM
  # ============================================================================

  siem_central:
    image: splunk/splunk:9.1
    container_name: siem_central
    hostname: splunk-siem
    restart: unless-stopped

    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.8
      backend_net:
        ipv4_address: 172.20.3.8
      monitoring_net:
        ipv4_address: 172.20.4.8

    ports:
      - "8000:8000"

    volumes:
      - splunk_data:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
      - ./configs/splunk:/tmp/defaults:ro
      - mongo_audit_logs:/var/log/mongodb

    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - SPLUNK_ROLE=splunk_standalone

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 4: DATA - MongoDB
  # ============================================================================

  db_primary:
    image: mongo:7.0
    container_name: db_primary
    hostname: mongo-primary
    restart: unless-stopped

    networks:
      backend_net:
        ipv4_address: 172.20.3.5

    # In Zero Trust MongoDB non dovrebbe essere esposto fuori.
    # Per debug locale puoi riabilitare temporaneamente:
    # ports:
    #   - "27017:27017"

    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./certs/server:/certs:ro
      - ./configs/mongodb/mongod.conf:/etc/mongod.conf:ro
      - ./configs/mongodb/init-scripts:/docker-entrypoint-initdb.d:ro
      - mongo_audit_logs:/var/log/mongodb

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # TEMP BACKEND API
  # ============================================================================
  # Backend temporaneo per testare Envoy.
  # La Persona 4 potrà sostituirlo con una vera API che parla con MongoDB.
  # Envoy inoltra verso questo servizio su api_backend:3000.

  api_backend:
    image: node:20-alpine
    container_name: api_backend
    hostname: api_backend
    restart: unless-stopped
    working_dir: /app

    command: >
      sh -c "node -e \"
      const http = require('http');
      const server = http.createServer((req, res) => {
        res.setHeader('Content-Type', 'application/json');
        res.end(JSON.stringify({
          service: 'api_backend',
          status: 'ok',
          method: req.method,
          url: req.url,
          message: 'Request forwarded correctly by Envoy'
        }));
      });
      server.listen(3000, '0.0.0.0');
      \""

    networks:
      backend_net:
        ipv4_address: 172.20.3.20

    depends_on:
      db_primary:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 3: DECISION - OPA Policy Engine
  # ============================================================================

  pdp_engine:
    build:
      context: ./services/opa
      dockerfile: Dockerfile
    container_name: pdp_engine
    hostname: opa-policy
    restart: unless-stopped

    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.6
      monitoring_net:
        ipv4_address: 172.20.4.6

    ports:
      - "8181:8181"
      - "9191:9191"

    volumes:
      - ./configs/opa/config.yaml:/config/opa-config.yaml:ro
      - ./configs/opa/policies:/policies:ro
      - ./configs/opa/data:/data:ro

    environment:
      - SPLUNK_HEC_URL=http://siem_central:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - MONGODB_HOST=db_primary
      - MONGODB_PORT=27017

    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--config-file=/config/opa-config.yaml"
      - "--log-level=info"
      - "--log-format=json"
      - "/policies"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health?bundle=true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    depends_on:
      siem_central:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 2: ENFORCEMENT - Envoy Proxy PEP
  # ============================================================================

  pep_gateway:
    build:
      context: ./services/envoy
      dockerfile: Dockerfile
    container_name: pep_gateway
    hostname: envoy-gateway
    restart: unless-stopped

    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.7
      backend_net:
        ipv4_address: 172.20.3.7
      clients_net:
        ipv4_address: 172.20.5.7

    ports:
      - "8443:8443"
      - "127.0.0.1:9901:9901"

    volumes:
      - ./configs/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs/server:/certs:ro
      - envoy_logs:/var/log/envoy

    environment:
      - OPA_HOST=pdp_engine
      - OPA_PORT=9191
      - API_BACKEND_HOST=api_backend
      - API_BACKEND_PORT=3000
      - SPLUNK_HEC_URL=http://siem_central:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}

    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    depends_on:
      pdp_engine:
        condition: service_healthy
      api_backend:
        condition: service_started

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 1: NETWORK SECURITY - NFTables Firewall
  # ============================================================================

  firewall_perimeter:
    build:
      context: ./services/nftables
      dockerfile: Dockerfile
    container_name: firewall_perimeter
    hostname: nft-firewall
    restart: unless-stopped

    networks:
      clients_net:
        ipv4_address: 172.20.5.10
      zerotrust_net:
        ipv4_address: 172.20.2.10
      backend_net:
        ipv4_address: 172.20.3.10
      monitoring_net:
        ipv4_address: 172.20.4.10

    cap_add:
      - NET_ADMIN

    volumes:
      - ./configs/nftables/rules.nft:/etc/nftables/rules.nft:ro
      - nftables_logs:/var/log/nftables

    environment:
      - ENVOY_IP=172.20.2.7
      - MONGODB_IP=172.20.3.5
      - SPLUNK_IP=172.20.4.8
      - OPA_IP=172.20.2.6

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 1: NETWORK SECURITY - Snort IDS
  # ============================================================================

  ids_network_monitor:
    build:
      context: .
      dockerfile: services/snort/Dockerfile
    container_name: ids_network_monitor
    hostname: snort-ids
    restart: unless-stopped

    networks:
      clients_net:
        ipv4_address: 172.20.5.11
      zerotrust_net:
        ipv4_address: 172.20.2.11
      backend_net:
        ipv4_address: 172.20.3.11
      monitoring_net:
        ipv4_address: 172.20.4.11

    cap_add:
      - NET_ADMIN
      - NET_RAW

    volumes:
      - ./configs/snort/snort.lua:/etc/snort/snort.lua:ro
      - ./configs/snort/rules:/etc/snort/rules:ro
      - snort_logs:/var/log/snort

    environment:
      - INTERFACE=eth0:eth1:eth2:eth3
      - HOME_NET=172.20.0.0/16
      - SPLUNK_HEC_URL=http://172.20.2.8:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}

    depends_on:
      siem_central:
        condition: service_started

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # TESTING CLIENTS
  # ============================================================================
  # Client coerenti con gli utenti MongoDB:
  # - operatore_ancona
  # - capitano_claudia
  # - soc_admin
  # - intruso per test negativo

  client_operatore_ancona:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: operatore_ancona
        CLIENT_ROLE: ruolo_banchina
    container_name: client_operatore_ancona
    hostname: client-operatore-ancona
    restart: "no"

    networks:
      clients_net:
        ipv4_address: 172.20.5.20

    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/operatore_ancona:/certs:ro

    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_NAME=operatore_ancona
      - CLIENT_ROLE=ruolo_banchina
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt

    depends_on:
      pep_gateway:
        condition: service_healthy

    profiles:
      - testing

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  client_capitano_claudia:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: capitano_claudia
        CLIENT_ROLE: ruolo_equipaggio
    container_name: client_capitano_claudia
    hostname: client-capitano-claudia
    restart: "no"

    networks:
      clients_net:
        ipv4_address: 172.20.5.21

    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/capitano_claudia:/certs:ro

    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_NAME=capitano_claudia
      - CLIENT_ROLE=ruolo_equipaggio
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt

    depends_on:
      pep_gateway:
        condition: service_healthy

    profiles:
      - testing

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  client_soc_admin:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: soc_admin
        CLIENT_ROLE: ruolo_gestione_flotta
    container_name: client_soc_admin
    hostname: client-soc-admin
    restart: "no"

    networks:
      clients_net:
        ipv4_address: 172.20.5.22

    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/soc_admin:/certs:ro

    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_NAME=soc_admin
      - CLIENT_ROLE=ruolo_gestione_flotta
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt

    depends_on:
      pep_gateway:
        condition: service_healthy

    profiles:
      - testing

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  client_intruso:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: intruso
        CLIENT_ROLE: ruolo_non_autorizzato
    container_name: client_intruso
    hostname: client-intruso
    restart: "no"

    networks:
      clients_net:
        ipv4_address: 172.20.5.23

    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/intruso:/certs:ro

    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_NAME=intruso
      - CLIENT_ROLE=ruolo_non_autorizzato
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt

    depends_on:
      pep_gateway:
        condition: service_healthy

    profiles:
      - testing

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ==============================================================================
# NETWORKS
# ==============================================================================

networks:
  clients_net:
    driver: bridge
    name: maritime-zta_clients
    ipam:
      config:
        - subnet: ${NETWORK_CLIENTS_SUBNET:-172.20.5.0/24}

  zerotrust_net:
    driver: bridge
    name: maritime-zta_zerotrust
    ipam:
      config:
        - subnet: ${NETWORK_ZTA_SUBNET:-172.20.2.0/24}

  backend_net:
    driver: bridge
    name: maritime-zta_backend
    internal: true
    ipam:
      config:
        - subnet: ${NETWORK_BACKEND_SUBNET:-172.20.3.0/24}

  monitoring_net:
    driver: bridge
    name: maritime-zta_monitoring
    ipam:
      config:
        - subnet: ${NETWORK_MONITORING_SUBNET:-172.20.4.0/24}

# ==============================================================================
# VOLUMES
# ==============================================================================

volumes:
  mongo_data:
    name: maritime-zta_mongo_data
    driver: local

  mongo_config:
    name: maritime-zta_mongo_config
    driver: local

  mongo_audit_logs:
    name: maritime-zta_mongo_audit_logs
    driver: local

  splunk_data:
    name: maritime-zta_splunk_data
    driver: local

  splunk_etc:
    name: maritime-zta_splunk_etc
    driver: local

  envoy_logs:
    name: maritime-zta_envoy_logs
    driver: local

  nftables_logs:
    name: maritime-zta_nftables_logs
    driver: local

  snort_logs:
    name: maritime-zta_snort_logs
    driver: local