#version: '3.8'

# ============================================
# Maritime - Zero Trust Architecture - Docker Compose
# ============================================
# Project: Maritime - Zero Trust Architecture (ZTA)
# Author: Person 1 - Network Guardian (Snort/IDS)
#         Person 2 - Envoy Manager (PEP)
#         Person 3 - Policy Engineer (OPA)
#         Person 4 - Data/SOC Operator (MongoDB/Splunk)
# Component: Orchestration & Network Segmentation
# Purpose: Define and orchestrate all 12 Docker services
#          with Zero Trust network isolation (4 trust zones)
# Data Creation: 2026-05-08
# Last Updated: 2026-05-15
# ============================================
# Security Model:
#   - Layer 1: Network Security (NFTables + Snort IDS)
#   - Layer 2: Enforcement (Envoy mTLS proxy)
#   - Layer 3: Decision (OPA policy engine)
#   - Layer 4: Data & Observability (MongoDB + Splunk)
#   - Clients: 5 testing profiles (corporate, VPN, satellite,
#              foreign agent, public WiFi)
# ============================================
# Network Zones:
#   clients_net   (172.20.5.0/24)  – Client entry point
#   zerotrust_net (172.20.2.0/24)  – Core ZTA processing
#   backend_net   (172.20.3.0/24)  – Isolated data storage
#   monitoring_net(172.20.4.0/24)  – Security logs & alerts
# ============================================

services:
  # ============================================================================
  # LAYER 4: OBSERVABILITY - SIEM (Must start first for log aggregation)
  # ============================================================================

  siem_central:
    #build:
    #  context: ./services/splunk
    #  dockerfile: Dockerfile
    image: splunk/splunk:9.1
    container_name: siem_central
    hostname: splunk-siem
    restart: unless-stopped

    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.8
      backend_net:
        ipv4_address: 172.20.3.8
      monitoring_net:
        ipv4_address: 172.20.4.8
    ports:
      #ponte che permette al tuo browser di comunicare con il server web di Splunk che gira nel container.
      - "8000:8000"   # Web UI
      # Rimosse 8088 (HEC) e 8089 (API REST) dalle porte esterne:
      # Snort, Envoy e OPA ci comunicheranno usando la rete interna Docker, bloccando attacchi esterni.
      #- "8088:8088"   # HTTP Event Collector (HEC)
      #- "8089:8089"   # Management port
    volumes:
      - splunk_data:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
      - ./configs/splunk:/tmp/defaults:ro
      #  in sola lettura il volume dove MongoDB scrive i log di audit JSON
      - mongo_audit_logs:/var/log/mongodb
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - SPLUNK_ROLE=splunk_standalone
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:8088/services/collector/health"]
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 4: DATA - MongoDB Primary Database
  # ============================================================================

  db_primary:
  #  build:
  #    context: ./services/mongodb
  #    dockerfile: Dockerfile
    image: mongo:7.0
    container_name: db_primary
    hostname: mongo-primary
    restart: unless-stopped
    # Isolamento Zero Trust
    networks:
      backend_net:
        ipv4_address: 172.20.3.5
    ports:
      - "27017:27017"
    volumes:
      # Volume per la persistenza fisica dei dati
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      # Chiavi crittografiche per connessione TLS (Sola lettura)
      - ./certs/server:/certs:ro
      # Configurazione di sicurezza (Sola lettura)
      - ./configs/mongodb/mongod.conf:/etc/mongod.conf:ro
      # Montaggio degli script in configs/mongodb/init-scripts
      - ./configs/mongodb/init-scripts:/docker-entrypoint-initdb.d:ro
      # Volume per tentativi di accesso, query effettuate o bloccate (da inviare al SIEM)
      - mongo_audit_logs:/var/log/mongodb

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 4: DATA - Database Seeder (One-shot initialization)
  # ============================================================================


  # ============================================================================
  # LAYER 3: DECISION - OPA Policy Engine (PDP)
  # ============================================================================

  pdp_engine:
    build:
      context: ./services/opa
      dockerfile: Dockerfile
    container_name: pdp_engine
    hostname: opa-policy
    restart: unless-stopped
    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.6
      monitoring_net:
        ipv4_address: 172.20.4.6
    ports:
      - "8181:8181"
    volumes:
      - ./configs/opa/policies:/policies:ro
      - ./configs/opa/data:/data:ro
    environment:
      - SPLUNK_HEC_URL=http://siem_central:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - MONGODB_HOST=db_primary
      - MONGODB_PORT=27017
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
      - "/policies"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health?bundle=true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      siem_central:
        condition: service_healthy
      db_primary:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 2: ENFORCEMENT - Envoy Proxy (PEP)
  # ============================================================================

  pep_gateway:
    build:
      context: ./services/envoy
      dockerfile: Dockerfile
    container_name: pep_gateway
    hostname: envoy-gateway
    restart: unless-stopped
    networks:
      zerotrust_net:
        ipv4_address: 172.20.2.7
      backend_net:
        ipv4_address: 172.20.3.7
      clients_net:
        ipv4_address: 172.20.5.7
    ports:
      - "8443:8443"   # mTLS listener
      - "9901:9901"   # Admin interface
    volumes:
      - ./configs/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs/server:/certs:ro
      - envoy_logs:/var/log/envoy
    environment:
      - OPA_HOST=pdp_engine
      - OPA_PORT=8181
      - MONGODB_HOST=db_primary
      - MONGODB_PORT=27017
      - SPLUNK_HEC_URL=http://siem_central:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      pdp_engine:
        condition: service_healthy
      db_primary:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 1: NETWORK SECURITY - NFTables Firewall
  # ============================================================================

  firewall_perimeter:
    build:
      context: ./services/nftables
      dockerfile: Dockerfile
    container_name: firewall_perimeter
    hostname: nft-firewall
    restart: unless-stopped
    networks:
      clients_net:
        ipv4_address: 172.20.5.10
      zerotrust_net:
        ipv4_address: 172.20.2.10
      backend_net:
        ipv4_address: 172.20.3.10
      monitoring_net:
        ipv4_address: 172.20.4.10
    cap_add:
      - NET_ADMIN
    volumes:
      - ./configs/nftables/rules.nft:/etc/nftables/rules.nft:ro
      - nftables_logs:/var/log/nftables
    environment:
      - ENVOY_IP=172.20.2.7
      - MONGODB_IP=172.20.3.5
      - SPLUNK_IP=172.20.4.8
      - OPA_IP=172.20.2.6
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # LAYER 1: NETWORK SECURITY - Snort IDS
  # ============================================================================

  ids_network_monitor:
    build:
      context: .
      dockerfile: services/snort/Dockerfile
    container_name: ids_network_monitor
    hostname: snort-ids
    restart: unless-stopped
    networks:
      clients_net:
        ipv4_address: 172.20.5.11
      zerotrust_net:
        ipv4_address: 172.20.2.11
      backend_net:
        ipv4_address: 172.20.3.11
      monitoring_net:
        ipv4_address: 172.20.4.11
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      # Update to .conf to .lua
      - ./configs/snort/snort.lua:/etc/snort/snort.lua:ro
      - ./configs/snort/rules:/etc/snort/rules:ro
      - snort_logs:/var/log/snort
    environment:
      # LAYER 1: NETWORK SECURITY - Snort IDS (monitors all 4 trust zones)
      # eth0: clients_net | Client traffic (corporate, VPN, satellite, foreign agent, public WiFi). Capture real attacks from clients (port scanning, SQLi, etc.).
      # eth1: zerotrust_net | ZTA network traffic (Envoy, OPA, Splunk, Firewall). Captures internal communications (requests to Envoy, OPA decisions, Splunk logs).
      # eth2: backend_net | Backend network traffic (MongoDB, audit logs). Captures direct access attempts to MongoDB that should be blocked by the firewall.
      # eth3: monitoring_net | Monitoring network traffic (logs and alerts). Captures the flow of logs from services to Splunk.
      - INTERFACE=eth0:eth1:eth2:eth3
      - HOME_NET=172.20.0.0/16
      - SPLUNK_HEC_URL=http://172.20.2.8:8088/services/collector
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
    depends_on:
      siem_central:
        condition: service_started #p1-snort prod:service_healthy/dev:service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    #entrypoint: ["/bin/bash", "-c", "sleep infinity"]

  # ============================================================================
  # TESTING CLIENTS - Profile: "testing"
  # Only started with: docker compose --profile testing up
  # ============================================================================

  client_corporate:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: corporate
        CLIENT_ROLE: operations
    container_name: client_corporate
    hostname: client-corporate
    restart: "no"
    networks:
      clients_net:
        ipv4_address: 172.20.5.20
    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/corporate:/certs:ro
    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt
    depends_on:
      pep_gateway:
        condition: service_healthy
    profiles:
      - testing
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  client_vpn_remote:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: vpn
        CLIENT_ROLE: remote_agent
    container_name: client_vpn_remote
    hostname: client-vpn-remote
    restart: "no"
    networks:
      clients_net:
        ipv4_address: 172.20.5.21
    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/vpn_remote:/certs:ro
    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt
    depends_on:
      pep_gateway:
        condition: service_healthy
    profiles:
      - testing

  client_satellite:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: satellite
        CLIENT_ROLE: branch_ops
    container_name: client_satellite
    hostname: client-satellite
    restart: "no"
    networks:
      clients_net:
        ipv4_address: 172.20.5.22
    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/satellite:/certs:ro
    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt
    depends_on:
      pep_gateway:
        condition: service_healthy
    profiles:
      - testing

  client_foreign_agent:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: foreign
        CLIENT_ROLE: partner
    container_name: client_foreign_agent
    hostname: client-foreign
    restart: "no"
    networks:
      clients_net:
        ipv4_address: 172.20.5.23
    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/foreign_agent:/certs:ro
    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt
    depends_on:
      pep_gateway:
        condition: service_healthy
    profiles:
      - testing

  client_public_wifi:
    build:
      context: ./services/clients
      dockerfile: Dockerfile
      args:
        CLIENT_TYPE: public
        CLIENT_ROLE: guest
    container_name: client_public_wifi
    hostname: client-public
    restart: "no"
    networks:
      clients_net:
        ipv4_address: 172.20.5.24
    volumes:
      - ./services/clients/scripts:/scripts:ro
      - ./certs/clients/public_wifi:/certs:ro
    environment:
      - ENVOY_HOST=pep_gateway
      - ENVOY_PORT=8443
      - CLIENT_CERT=/certs/client.crt
      - CLIENT_KEY=/certs/client.key
      - CA_CERT=/certs/ca.crt
    depends_on:
      pep_gateway:
        condition: service_healthy
    profiles:
      - testing

# ==============================================================================
# NETWORKS - Segmented by Security Layer (Zero Trust Isolation)
# ==============================================================================
# Purpose: Each network represents a different trust zone in the Zero Trust
# architecture. Services are placed in networks according to their function:
#
# +------------------+-------------------+-----------------------------------+
# | Network          | Security Layer     | Services & Purpose                |
# +------------------+-------------------+-----------------------------------+
# | clients_net      | Client Access     | Corporate, VPN, Satellite,        |
# | (172.20.5.0/24)  | Layer             | Foreign agents, Public WiFi       |
# |                  |                   | - All client traffic originates   |
# |                  |                   |   from this network               |
# |                  |                   | - mTLS required to reach Envoy    |
# +------------------+-------------------+-----------------------------------+
# | zerotrust_net    | L2 Enforcement    | Envoy (PEP), OPA (PDP), Splunk,   |
# | (172.20.2.0/24)  | + L3 Decision     | Snort, Firewall - Core ZTA plane  |
# |                  |                   | where mTLS and policy decisions   |
# |                  |                   | are enforced.                      |
# +------------------+-------------------+-----------------------------------+
# | backend_net      | L4 Data Store     | MongoDB, Splunk (audit logs)      |
# | (172.20.3.0/24)  | (Internal Only)   | - Isolated from external access   |
# |                  |                   | - Only Envoy can reach MongoDB    |
# |                  |                   | - Network marked 'internal: true' |
# +------------------+-------------------+-----------------------------------+
# | monitoring_net   | L1+L4 Observ.     | Splunk (SIEM), Firewall, Snort    |
# | (172.20.4.0/24)  |                   | - All security logs are sent here |
# |                  |                   | - Snort alerts, nftables logs,    |
# |                  |                   |   and audit data converge         |
# +------------------+-------------------+-----------------------------------+
# Traffic Flow Rules (simplified):
#   clients_net -> zerotrust_net -> Envoy (port 8443) -> backend_net -> MongoDB
#                                                                     -> Splunk
#   All security logs from Snort, nftables, Envoy, OPA flow to monitoring_net
# ==============================================================================

networks:
  # First network (customer entry)
  clients_net:
    driver: bridge
    name: maritime-zta_clients
    ipam:
      config:
        - subnet: ${NETWORK_CLIENTS_SUBNET:-172.20.5.0/24}
  # Processing network (Envoy, OPA, Splunk, Snort, Firewall)
  zerotrust_net:
    driver: bridge
    name: maritime-zta_zerotrust
    ipam:
      config:
        - subnet: ${NETWORK_ZTA_SUBNET:-172.20.2.0/24}
  # Data network (MongoDB, Splunk logs)
  backend_net:
    driver: bridge
    name: maritime-zta_backend
    internal: true  # No external access
    ipam:
      config:
        - subnet: ${NETWORK_BACKEND_SUBNET:-172.20.3.0/24}
  # Observation network (logs and alerts)
  monitoring_net:
    driver: bridge
    name: maritime-zta_monitoring
    ipam:
      config:
        - subnet: ${NETWORK_MONITORING_SUBNET:-172.20.4.0/24}

# ==============================================================================
# VOLUMES - Persistent Storage
# ==============================================================================

volumes:
  mongo_data:
    name: maritime-zta_mongo_data
    driver: local

  mongo_config:
    name: maritime-zta_mongo_config
    driver: local

  mongo_audit_logs:
    name: maritime-zta_mongo_audit_logs
    driver: local

  splunk_data:
    name: maritime-zta_splunk_data
    driver: local

  splunk_etc:
    name: maritime-zta_splunk_etc
    driver: local

  envoy_logs:
    name: maritime-zta_envoy_logs
    driver: local

  nftables_logs:
    name: maritime-zta_nftables_logs
    driver: local

  snort_logs:
    name: maritime-zta_snort_logs
    driver: local
